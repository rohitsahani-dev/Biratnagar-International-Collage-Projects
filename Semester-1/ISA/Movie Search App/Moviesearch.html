
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Search Application</title>
  <link rel="stylesheet" href="Moviesearch.css">
</head>
<body>

  <div class="container">
    <h1> Movie Search App</h1>

    <div class="search-box">
      <input type="text" id="movieInput" placeholder="Enter movie name (Eg. Avenger)">
      <button id="searchBtn">Search</button>
    </div>

    <div id="errorMessage"></div>

    <div id="movieResult"></div>

    <footer>
      <p>Data provided by <b>OMDb API</b></p>
    </footer>
  </div>

  <script src="Moviesearch.js"></script>
</body>
</html>
